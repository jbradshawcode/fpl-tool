<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FPL xP — Expected Points</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Archivo+Expanded:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="wrap">

        <div class="topbar">
            <div class="brand">
                <div class="kick">Fantasy · Gameweek model</div>
                <h1>Expected Points</h1>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
                <div class="theme-track">
                    <div class="theme-knob"></div>
                </div>
                <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </div>
        </div>

        {% if season_over %}
        <div class="season-banner">
            Season complete — showing final 2024-25 data
        </div>
        {% endif %}

        {% include '_filters.html' %}
        {% include '_table.html' %}
        {% include '_pagination.html' %}

    </div>

    <div id="fpl-config"
        data-max-games="{{ max_games }}"
        data-selected-positions="{{ selected_positions|join(',') }}"
        data-selected-teams="{{ selected_teams|join(',') }}"
        data-sort-by="{{ sort_by }}"
        data-sort-order="{{ sort_order }}"
        data-page="{{ page }}">
    </div>
    <script>
        (function() {
            var t = localStorage.getItem('fpl-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
        function toggleTheme() {
            var html = document.documentElement;
            var isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('fpl-theme', isDark ? 'light' : 'dark');
        }
    </script>
    <script type="module" src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
